<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: transparent;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #reader {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="reader"></div>
    <!--
      bridge.js (kept verbatim) posts events through window.ReactNativeWebView.postMessage. On
      Android we provide that global by shimming it onto the @JavascriptInterface the host registers
      as AndroidReaderBridge, so bridge.js can postMessage unchanged. This must run before the module
      script below.
    -->
    <script>
      window.ReactNativeWebView = {
        postMessage: function (msg) {
          window.AndroidReaderBridge.postMessage(msg);
        },
      };
    </script>
    <script type="module" src="./bridge.js"></script>
  </body>
</html>
